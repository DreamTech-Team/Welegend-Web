version: "3"

networks:
    nw-welegend:
        driver: bridge

services:
    nginx:
        build:
            context: ./nginx
        networks:
            - nw-welegend
        hostname: nginx
        container_name: nginx-reverse-proxy
        ports:
            - "80:80"
        volumes:
            - ./nginx:/etc/nginx
        depends_on:
            - welegend-web

    welegend-web:
        build:
            context: ../welegend
        container_name: welegend-web
        hostname: localhost
        networks:
            - nw-welegend
        ports:
            - "3010:3000"
        environment:
            FORCE_COLOR: 1
            DEBUG_COLORS: "true"
            TERM: xterm-256color
            COLORTERM: truecolor

