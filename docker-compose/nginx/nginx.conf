daemon off;

events {
    worker_connections 4096;
}

http {
	  proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Host $server_name;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        location / {
            proxy_pass http://13.239.133.103:3010/;
        }

        location /favicon.ico {
            proxy_pass http://13.239.133.103:3010/favicon.ico;
        }

        location /_next/ {
            proxy_pass http://13.239.133.103:3010/_next/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        ssl on;
		    ssl_certificate /etc/nginx/ssl/certificates.crt;
        ssl_certificate_key /etc/nginx/ssl/private.key;

        server_name welegend.gokag.id.vn;

        location / {
            proxy_pass http://13.239.133.103:3010/;
        }

        location /favicon.ico {
            proxy_pass http://13.239.133.103:3010/favicon.ico;
        }

        location /_next/ {
            proxy_pass http://13.239.133.103:3010/_next/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
